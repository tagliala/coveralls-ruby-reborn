name: RuboCop

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  rubocop:
    name: RuboCop
    runs-on: ubuntu-latest
    env:
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 3
    steps:
    - uses: actions/checkout@v7.0.0
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1.314.0
      with:
        ruby-version: '4.0'
        bundler-cache: true
    - name: Ruby linter
      run: bundle exec rubocop --format github
